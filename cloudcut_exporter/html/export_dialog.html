<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>CloudCut</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2 id="app-title">CloudCut</h2>

  <div class="section">
    <h3>Detected Parts</h3>
    <div id="partsList" class="parts-list"></div>
  </div>

  <div class="section">
    <h3>Output Format</h3>
    <label><input type="radio" name="format" value="svg"> SVG</label>
    <label><input type="radio" name="format" value="json" checked> JSON</label>
  </div>

  <div class="section">
    <h3>Output Units</h3>
    <label><input type="radio" name="units" value="mm" id="unitMm" onchange="refreshDisplay()"> Millimeters</label>
    <label><input type="radio" name="units" value="in" id="unitIn" onchange="refreshDisplay()"> Inches</label>
  </div>

  <div class="section">
    <h3>Material Filter</h3>
    <label class="toggle-all"><input type="checkbox" id="allMaterials" checked onchange="toggleAll('materials', this.checked)"> All</label>
    <div id="materialFilters" class="filter-group"></div>
  </div>

  <div class="section">
    <h3>Thickness Filter</h3>
    <label class="toggle-all"><input type="checkbox" id="allThicknesses" checked onchange="toggleAll('thicknesses', this.checked)"> All</label>
    <div id="thicknessFilters" class="filter-group"></div>
  </div>

  <div class="buttons">
    <button id="exportBtn" onclick="doExport()">Export</button>
    <button id="cancelBtn" onclick="doCancel()">Cancel</button>
  </div>

  <script src="dialog.js"></script>
</body>
</html>
